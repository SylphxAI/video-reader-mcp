name: Publish to MCP Registry

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish MCP Registry metadata
    runs-on: ubuntu-latest
    steps:
      - name: Create release bot token
        id: release-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ steps.release-token.outputs.token }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version with release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json
          cat server.json

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

      - name: Commit synced server.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.json
          if git diff --staged --quiet; then
            echo "server.json already aligned on main"
            exit 0
          fi
          git commit -m "chore(registry): sync server.json to ${GITHUB_REF_NAME}"
          git push origin HEAD:main