name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release tag (e.g. v0.1.0)
        required: true
        default: v0.1.0

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish MCP Registry metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version with release tag
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && format('{0}', github.event.inputs.version) || github.ref_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json
          cat server.json

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

      - name: Commit synced server.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.json
          if git diff --staged --quiet; then
            echo "server.json already aligned on main"
            exit 0
          fi
          git commit -m "chore(registry): sync server.json to ${GITHUB_REF_NAME}"
          git push origin HEAD:main